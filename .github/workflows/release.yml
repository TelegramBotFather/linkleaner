name: Build and deploy

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

concurrency:
  group: ${{ github.workflow }}

permissions:
  packages: write
  contents: write

jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        fetch-depth: 0

    - name: Install Nix
      uses: cachix/install-nix-action@616559265b40713947b9c190a8ff4b507b5df49b # v31
      with:
        github_access_token: ${{ secrets.GITHUB_TOKEN }}
        extra_nix_config: |
          trusted-substituters = https://cache.nixos.org https://nix-community.cachix.org
          trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs=

    - name: Restore and cache Nix store
      uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7.0.2
      with:
        primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock') }}
        restore-prefixes-first-match: nix-${{ runner.os }}-
        gc-max-store-size-linux: 1073741824
        purge: false # Seems to be causing issues in release jobs
        purge-prefixes: nix-${{ runner.os }}-
        purge-created: 0
        purge-primary-key: never

    - name: Build container image
      shell: bash
      run: |
        nix build .#container

    - name: Deploy to fly.io
      shell: bash
      env:
        FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      run: |
        # We manually publish the image to avoid having to rewrite the tag
        nix run .#skopeo -- \
          --insecure-policy \
          copy \
          docker-archive:./result \
          docker://registry.fly.io/linkleaner:latest \
          --dest-creds x:"$FLY_API_TOKEN" \
          --format v2s2
        nix run .#flyctl deploy

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and publish image to GitHub Container Registry
      shell: bash
      run: |
        # Get image details
        IMAGE_NAME="$(nix eval --raw .#packages.x86_64-linux.ghContainer.imageName)"
        IMAGE_TAG="$(nix eval --raw .#packages.x86_64-linux.ghContainer.imageTag)"

        # Build and load the image
        nix build .#ghContainer
        docker load < ./result

        # Push image to ghcr.io
        docker push "${IMAGE_NAME}":"${IMAGE_TAG}"

    - name: Get changelog entry
      id: changelog_reader
      uses: mindsers/changelog-reader-action@32aa5b4c155d76c94e4ec883a223c947b2f02656 # v2.2.3
      with:
        version: ${{ env.VERSION }}
        path: ./CHANGELOG.md

    - name: Create GitHub release
      shell: bash
      env:
        GITHUB_TOKEN: ${{ secrets.POST_RELEASE_GH_TOKEN }}
        CHANGELOG: ${{ steps.changelog_reader.outputs.changes }}
        GH_TOKEN: ${{ github.token }}
      run: |
        NOTES_FILE="$(mktemp)"
        printf "%s\n" "${CHANGELOG}" > "${NOTES_FILE}"

        VERSION="$(git tag -l | tail -n1)"

        gh release create "${VERSION}" --notes-file "${NOTES_FILE}" --title "${VERSION}"
